<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>展会信息登记系统</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --primary-hover: #45a049;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            color: #2c3e50;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: #34495e;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #2c3e50;
        }

        .btn-back {
            background-color: #7f8c8d;
            color: white;
            margin-top: 20px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        select.form-control {
            height: 40px;
        }

        /* 隐藏不需要的页面 */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* 表格样式 */
        .table-container {
            overflow-x: auto;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f8f9fa;
        }

        .max-w-admin {
            max-width: 700px;
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    
    <div id="homePage" class="card page active">
        <h2>展会信息系统</h2>
        <p style="color: #666; margin-bottom: 30px;">请选择您的操作入口</p>
        <button class="btn btn-primary" onclick="switchPage('registerPage')">参展者登记入口</button>
        <button class="btn btn-secondary" onclick="switchPage('adminAuthPage')">管理人员入口</button>
    </div>

    <div id="registerPage" class="card page">
        <h2>参展者信息登记</h2>
        <form id="regForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="username">1. 姓名</label>
                <input type="text" id="username" class="form-control" required placeholder="请输入您的姓名">
            </div>
            <div class="form-group">
                <label for="phone">2. 联系方式</label>
                <input type="tel" id="phone" class="form-control" required placeholder="请输入您的手机号">
            </div>
            <div class="form-group">
                <label for="role">3. 身份类别</label>
                <select id="role" class="form-control" required>
                    <option value="" disabled selected>请选择您的身份</option>
                    <option value="参展者">参展者</option>
                    <option value="主办方">主办方</option>
                    <option value="参展商">参展商</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">提交登记</button>
        </form>
        <button class="btn btn-back" onclick="switchPage('homePage')">返回首页</button>
    </div>

    <div id="adminAuthPage" class="card page">
        <h2>管理员身份验证</h2>
        <div class="form-group">
            <label for="adminPwd">请输入访问密码</label>
            <input type="password" id="adminPwd" class="form-control" placeholder="请输入密码查看数据">
        </div>
        <button class="btn btn-secondary" onclick="verifyAdmin()">验证并进入</button>
        <button class="btn btn-back" onclick="switchPage('homePage')">返回首页</button>
    </div>

    <div id="adminDashboardPage" class="card page">
        <h2>参展者信息汇总</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>姓名</th>
                        <th>联系方式</th>
                        <th>身份</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    </tbody>
            </table>
        </div>
        <button class="btn btn-back" onclick="logoutAdmin()">退出管理中心</button>
    </div>

</div>

<script>
    // 模拟本地数据库（使用浏览器的 localStorage 存储，刷新页面数据不会丢失）
    let db = JSON.parse(localStorage.getItem('exhibitor_data')) || [
        // 预设两条测试数据
        { name: "张三", phone: "13800138000", role: "参展者" },
        { name: "李四", phone: "13911112222", role: "参展商" }
    ];

    // 页面切换核心逻辑
    function switchPage(pageId) {
        // 隐藏所有页面
        document.querySelectorAll('.page').forEach(page => {
            page.classList.remove('active');
        });
        // 显示目标页面
        document.getElementById(pageId).classList.add('active');
        
        // 针对管理页调整容器宽度
        const container = document.getElementById('mainContainer');
        if(pageId === 'adminDashboardPage') {
            container.classList.add('max-w-admin');
        } else {
            container.classList.remove('max-w-admin');
        }
    }

    // 处理参展者登记提交
    function handleRegister(event) {
        event.preventDefault(); // 阻止表单默认提交刷新
        
        const name = document.getElementById('username').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const role = document.getElementById('role').value;

        if(!name || !phone || !role) {
            alert('请填写完整的登记信息！');
            return;
        }

        // 存入模拟数据库
        db.push({ name, phone, role });
        localStorage.setItem('exhibitor_data', JSON.stringify(db));

        alert('登记成功！欢迎您的参与。');
        document.getElementById('regForm').reset(); // 重置表单
        switchPage('homePage'); // 返回首页
    }

    // 验证管理员密码
    function verifyAdmin() {
        const pwdInput = document.getElementById('adminPwd').value;
        const correctPwd = "lvse123456"; // 你要求的密码

        if (pwdInput === correctPwd) {
            document.getElementById('adminPwd').value = ''; // 清空输入框
            renderTable();
            switchPage('adminDashboardPage');
        } else {
            alert('密码错误，拒绝访问！');
        }
    }

    // 渲染管理员表格数据
    function renderTable() {
        const tbody = document.getElementById('dataTableBody');
        tbody.innerHTML = ''; // 先清空原有内容

        if (db.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#999;">暂无登记信息</td></tr>`;
            return;
        }

        db.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${escapeHtml(item.name)}</td>
                <td>${escapeHtml(item.phone)}</td>
                <td>${escapeHtml(item.role)}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 退出管理
    function logoutAdmin() {
        switchPage('homePage');
    }

    // 防止XSS安全漏洞的字符转义小工具
    function escapeHtml(string) {
        return String(string).replace(/[&<>"']/g, function (s) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s];
        });
    }
</script>
</body>
</html>
